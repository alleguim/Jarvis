* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* ── CANVAS BACKGROUND ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── SCANLINES ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 999;
}

/* ── MAIN LAYOUT ── */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px) 0;
}

/* ── HEADER ── */
header {
  padding: 16px 20px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(0,212,255,0.2);
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 6px;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(0,212,255,0.3);
  animation: flicker 6s infinite;
}

@keyframes flicker {
  0%,95%,100% { opacity: 1; }
  96% { opacity: 0.7; }
  97% { opacity: 1; }
  98% { opacity: 0.5; }
}

.status-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: pulse-dot 2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.3s; background: var(--gold); box-shadow: 0 0 8px var(--gold); }
.dot:nth-child(3) { animation-delay: 0.6s; }

@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

/* ── ARC REACTOR ── */
.reactor-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0 8px;
  gap: 8px;
}

.arc-reactor {
  position: relative;
  width: 90px; height: 90px;
  cursor: pointer;
}

.arc-reactor svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 12px var(--cyan-glow));
}

.arc-reactor .ring-outer {
  animation: spin 8s linear infinite;
  transform-origin: center;
}
.arc-reactor .ring-mid {
  animation: spin 5s linear infinite reverse;
  transform-origin: center;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.arc-reactor.listening .ring-outer { animation-duration: 1s; }
.arc-reactor.listening .ring-mid { animation-duration: 0.6s; }
.arc-reactor.listening svg { filter: drop-shadow(0 0 24px rgba(255,60,60,0.8)); }
.arc-reactor.thinking svg { filter: drop-shadow(0 0 24px rgba(240,180,41,0.8)); }

.core-glow {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--cyan);
}

/* ── STATUS LINE ── */
.status-line {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--cyan);
  opacity: 0.7;
  text-align: center;
  min-height: 14px;
}

/* ── WAVEFORM ── */
#waveform {
  width: 100%;
  height: 40px;
  display: none;
}
#waveform.active { display: block; }

/* ── CONVERSATION ── */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

#chat::-webkit-scrollbar { width: 2px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--cyan-dim); }

.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 13px;
  line-height: 1.6;
  animation: msg-in 0.3s ease;
  position: relative;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user {
  align-self: flex-end;
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid rgba(0, 212, 255, 0.3);
  color: var(--cyan);
  border-radius: 4px 4px 0 4px;
}

.msg.user::before {
  content: 'VOUS';
  display: block;
  font-size: 9px;
  letter-spacing: 3px;
  opacity: 0.5;
  margin-bottom: 4px;
}

.msg.jarvis {
  align-self: flex-start;
  background: rgba(0, 30, 60, 0.7);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-left: 2px solid var(--cyan);
  color: #c8e8f5;
}

.msg.jarvis::before {
  content: 'J.A.R.V.I.S';
  display: block;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--cyan);
  opacity: 0.7;
  margin-bottom: 4px;
  font-family: 'Orbitron', sans-serif;
}

.typing-indicator {
  display: flex;
  gap: 5px;
  padding: 14px;
  align-self: flex-start;
  background: rgba(0, 30, 60, 0.7);
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-left: 2px solid var(--cyan);
  border-radius: 4px;
  animation: msg-in 0.3s ease;
}

.typing-indicator span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  animation: bounce 1s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  0%,100% { transform: translateY(0); opacity: 0.4; }
  50% { transform: translateY(-5px); opacity: 1; }
}

/* ── INPUT AREA ── */
footer {

<script>
// ═══════════════════════════════════════
//  BACKGROUND PARTICLE GRID
// ═══════════════════════════════════════
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, nodes = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildNodes();
}

function buildNodes() {
  nodes = [];
  const cols = Math.floor(W / 60), rows = Math.floor(H / 60);
  for (let i = 0; i <= cols; i++)
    for (let j = 0; j <= rows; j++)
      nodes.push({ x: i*(W/cols), y: j*(H/rows), r: Math.random()*1.2+0.3, a: Math.random()*Math.PI*2, sp: (Math.random()-0.5)*0.3 });
}

function drawBg() {
  ctx.clearRect(0,0,W,H);
  nodes.forEach(n => { n.a += n.sp * 0.01; });
  // draw lines
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
      if (d < 80) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `rgba(0,212,255,${(1-d/80)*0.06})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,212,255,0.3)';
    ctx.fill();
  });
  requestAnimationFrame(drawBg);
}

resize();
window.addEventListener('resize', resize);
drawBg();

// ═══════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════
function tick() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('sys-time').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('sys-date').textContent = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
}
tick(); setInterval(tick, 1000);

// ═══════════════════════════════════════
//  API KEY
// ═══════════════════════════════════════
let apiKey = localStorage.getItem('jarvis_key') || '';
const modal = document.getElementById('api-modal');

if (apiKey) modal.classList.add('hidden');

document.getElementById('api-key-btn').onclick = () => {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem('jarvis_key', apiKey);
  modal.classList.add('hidden');
  addMessage('jarvis', 'Système en ligne. Bonjour. Je suis J.A.R.V.I.S — votre assistant personnel. Comment puis-je vous aider aujourd\'hui ?');
};

// ═══════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════
const chatEl = document.getElementById('chat');
let history = [];

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  if (role === 'jarvis') speak(text);
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing-indicator';
  t.id = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(t);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendToJarvis(userText) {
  history.push({ role: 'user', content: userText });
  addMessage('user', userText);
  setStatus('TRAITEMENT EN COURS...');
  document.getElementById('arc-reactor').classList.add('thinking');
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: `Tu es J.A.R.V.I.S (Just A Rather Very Intelligent System), l'assistant IA d'Iron Man. Tu réponds en français sauf si l'utilisateur écrit en anglais. Tu es précis, élégant, légèrement formel, avec une pointe d'humour britannique. Tu ne rappelles jamais que tu es une IA — tu es J.A.R.V.I.S. Garde tes réponses concises (2-4 phrases max sauf si demande détaillée).`,
        messages: history
      })
    });
    const data = await res.json();
    hideTyping();
    document.getElementById('arc-reactor').classList.remove('thinking');
    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMessage('jarvis', reply);
      setStatus('SYSTÈME PRÊT');
    } else {
      addMessage('jarvis', 'Erreur système. Vérifiez votre clé API.');
      setStatus('ERREUR');
    }
  } catch(e) {
    hideTyping();
    document.getElementById('arc-reactor').classList.remove('thinking');
    addMessage('jarvis', 'Connexion échouée. Vérifiez votre clé API et votre connexion.');
    setStatus('DÉCONNECTÉ');
  }
}

// ═══════════════════════════════════════
//  TEXT INPUT
// ═══════════════════════════════════════
const input = document.getElementById('text-input');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});
document.getElementById('send-btn').onclick = doSend;

function doSend() {
  const t = input.value.trim();
  if (!t || !apiKey) return;
  input.value = '';
  input.style.height = 'auto';
  sendToJarvis(t);
}

// ═══════════════════════════════════════
//  STATUS
// ═══════════════════════════════════════
function setStatus(txt) {
  document.getElementById('status-line').textContent = txt;
}

// ═══════════════════════════════════════
//  SPEECH RECOGNITION
// ═══════════════════════════════════════
const micBtn = document.getElementById('mic-btn');
const reactor = document.getElementById('arc-reactor');
const waveCanvas = document.getElementById('waveform');
const wctx = waveCanvas.getContext('2d');
let recognition, isListening = false;
let audioCtx, analyser, source, animId;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'fr-FR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    input.value = t;
    stopListening();
    sendToJarvis(t);
    input.value = '';
  };
  recognition.onerror = () => stopListening();
  recognition.onend = () => stopListening();
}

micBtn.onclick = () => {
  if (!SpeechRecognition) {
    setStatus('MICRO NON SUPPORTÉ');
    return;
  }
  isListening ? stopListening() : startListening();
};

function startListening() {
  isListening = true;
  micBtn.classList.add('active');
  reactor.classList.add('listening');
  waveCanvas.classList.add('active');
  setStatus('ÉCOUTE EN COURS...');
  recognition.start();
  startWave();
}

function stopListening() {
  isListening = false;
  micBtn.classList.remove('active');
  reactor.classList.remove('listening');
  waveCanvas.classList.remove('active');
  setStatus('SYSTÈME PRÊT');
  try { recognition.stop(); } catch(e){}
  stopWave();
}

// Fake waveform animation
let wavePhase = 0;
function startWave() {
  function draw() {
    waveCanvas.width = waveCanvas.offsetWidth;
    const w = waveCanvas.width, h = waveCanvas.height;
    wctx.clearRect(0,0,w,h);
    wctx.strokeStyle = 'rgba(255,60,60,0.8)';
    wctx.lineWidth = 1.5;
    wctx.beginPath();
    for (let x = 0; x < w; x++) {
      const t = (x / w) * Math.PI * 8 + wavePhase;
      const amp = 12 * Math.sin(x/w * Math.PI) * (0.5 + 0.5*Math.sin(wavePhase*0.5));
      const y = h/2 + amp * Math.sin(t);
      x === 0 ? wctx.moveTo(x,y) : wctx.lineTo(x,y);
    }
    wctx.stroke();
    wavePhase += 0.12;
    animId = requestAnimationFrame(draw);
  }
  draw();
}

function stopWave() {
  cancelAnimationFrame(animId);
  wctx.clearRect(0,0,waveCanvas.width,waveCanvas.height);
}

// ═══════════════════════════════════════
//  TEXT-TO-SPEECH
// ═══════════════════════════════════════
function speak(text) {
  if (!window.speechSynthesis) return;
  const short = text.substring(0,200);
  const utter = new SpeechSynthesisUtterance(short);
  utter.lang = 'fr-FR';
  utter.rate = 0.95;
  utter.pitch = 0.85;
  utter.volume = 0.9;
  // Try to find a good voice
  const voices = speechSynthesis.getVoices();
  const pref = voices.find(v => v.lang.startsWith('fr') && v.name.toLowerCase().includes('male'))
    || voices.find(v => v.lang.startsWith('fr'));
  if (pref) utter.voice = pref;
  speechSynthesis.speak(utter);
}

// Preload voices
window.speechSynthesis && window.speechSynthesis.getVoices();
speechSynthesis && speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());

// ═══════════════════════════════════════
//  AUTO-GREET
// ═══════════════════════════════════════
if (apiKey) {
  setTimeout(() => {
    addMessage('jarvis', 'Bonjour. Systèmes initialisés. Je suis J.A.R.V.I.S — prêt à vous assister. Comment puis-je vous être utile ?');
  }, 800);
}
</script>
